name: Build and Publish Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish, for example v2.0.1"
        required: true
        type: string

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-release:
    name: Build release EXE
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Determine release tag
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.version }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }

          $tag = $tag.Trim()
          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+([-.][0-9A-Za-z.]+)?$') {
            throw "Release tag '$tag' must look like v2.0.1."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$($tag.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      - name: Validate version metadata
        shell: python
        run: |
          import pathlib
          import re
          import tomllib

          expected = "${{ steps.release.outputs.version }}"
          project_version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"][
              "version"
          ]
          config_text = pathlib.Path("src/neural_extractor/config.py").read_text()
          package_text = pathlib.Path("src/neural_extractor/__init__.py").read_text()
          config_version = re.search(r'VERSION:\s*Final\[str\]\s*=\s*"([^"]+)"', config_text).group(
              1
          )
          package_version = re.search(r'__version__\s*=\s*"([^"]+)"', package_text).group(1)

          versions = {
              "pyproject.toml": project_version,
              "src/neural_extractor/config.py": config_version,
              "src/neural_extractor/__init__.py": package_version,
          }
          for path, version in versions.items():
              if version != expected:
                  raise SystemExit(
                      f"{path} version {version!r} does not match release tag version {expected!r}."
                  )

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade -r requirements.txt
          python -m pip check

      - name: Compile smoke check
        shell: pwsh
        run: python -m compileall -q src main.py

      - name: Build Windows EXE
        shell: pwsh
        run: python -m PyInstaller NeuralExtractor.spec --clean --noconfirm

      - name: Validate build output
        shell: pwsh
        run: |
          $exe = "dist\NeuralExtractor.exe"
          if (-not (Test-Path $exe)) {
            throw "Expected build output not found: $exe"
          }
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  NeuralExtractor.exe" | Set-Content -Path "dist\NeuralExtractor.exe.sha256" -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuralExtractor-${{ steps.release.outputs.tag }}-windows
          path: |
            dist/NeuralExtractor.exe
            dist/NeuralExtractor.exe.sha256

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $title = "Neural Extractor $tag"
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          @"
          Automated Windows build for $tag.

          The in-app updater downloads NeuralExtractor.exe from the latest GitHub Release.
          "@ | Set-Content -Path $notesPath -Encoding utf8

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag "dist\NeuralExtractor.exe" "dist\NeuralExtractor.exe.sha256" --clobber
          } else {
            gh release create $tag "dist\NeuralExtractor.exe" "dist\NeuralExtractor.exe.sha256" --target $env:GITHUB_SHA --title $title --notes-file $notesPath --latest
          }

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
