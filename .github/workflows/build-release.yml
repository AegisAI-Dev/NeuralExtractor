name: Build and Release Neural Extractor V3

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Exact numeric release version, for example 3.0.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: "pip"

      - name: Validate release version
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ github.ref_name }}" -ne "${{ github.event.repository.default_branch }}") {
            Write-Error "Manual releases must run from the repository default branch."
            exit 1
          }
          $releaseRef = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ github.event.inputs.version }}" } else { "${{ github.ref_name }}" }
          python scripts/release_tools.py validate --release-ref $releaseRef
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $version = $releaseRef -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Require a new tag for manual releases
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.release.outputs.tag }}';
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
              core.setFailed(`Tag ${tag} already exists. Use a new source version or the tag-triggered workflow.`);
            } catch (error) {
              if (error.status !== 404) throw error;
            }

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade --upgrade-strategy eager -e ".[dev,build]"

      - name: Validate
        shell: pwsh
        run: |
          python -m ruff check src tests scripts main.py
          python -m compileall -q src scripts main.py
          $env:PYTHONPATH = "$PWD\src"
          python -m pytest tests -q

      - name: Build EXE
        run: python -m PyInstaller NeuralExtractorV3.spec --clean --noconfirm

      - name: Rename and checksum
        shell: pwsh
        run: |
          $version = "${{ steps.release.outputs.version }}"
          $exe = "dist\NeuralExtractorV3.exe"
          $versioned = "dist\NeuralExtractorV3-$version-windows-x64.exe"
          $manifest = "dist\NeuralExtractorV3-$version-manifest.json"
          Copy-Item $exe $versioned -Force
          Get-FileHash $versioned -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $(Split-Path $versioned -Leaf)" } |
            Set-Content "$versioned.sha256"
          python scripts/release_tools.py manifest --version $version --exe $versioned --output $manifest --minimum-updater-version 3.0.2
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuralExtractorV3-windows-x64
          path: |
            dist/NeuralExtractorV3*.exe
            dist/NeuralExtractorV3*.sha256
            dist/NeuralExtractorV3*-manifest.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Neural Extractor V3 ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/NeuralExtractorV3*.exe
            dist/NeuralExtractorV3*.sha256
            dist/NeuralExtractorV3*-manifest.json
